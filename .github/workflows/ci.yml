name: ci

on:
  push:
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Rust CLI
        run: cargo build -p chronow-cli

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Build MCP server
        run: cargo build -p chronow-mcp

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build crates/core --target nodejs --out-dir ../../packages/ts/wasm -- --features wasm

      - name: Install TS deps
        run: npm install --prefix packages/ts

      - name: Install Python package
        run: python -m pip install -e packages/python

      - name: Regenerate conformance corpus
        run: python3 scripts/generate_conformance_cases.py --chronow-bin target/debug/chronow

      - name: Ensure corpus is deterministic
        run: git diff --exit-code conformance/cases

      - name: Run full conformance matrix
        run: python3 conformance/runner/run.py --matrix rust ts python --strict

      - name: WASM conformance
        env:
          CHRONOW_WASM: "1"
        run: npm test --prefix packages/ts
